name: Deploy preview to GitHub Pages

# 2店舗サイトを GitHub Pages のサブパスに仮公開するプレビュー用ワークフロー。
#   https://gakikocamp.github.io/kinoko/            … 入口（店舗選択）
#   https://gakikocamp.github.io/kinoko/ohori/      … 大濠店
#   https://gakikocamp.github.io/kinoko/harada/     … 原田店
# 本番（独自ドメイン・ルート公開）には影響しません（base はこのワークフロー内だけで指定）。

on:
  push:
    branches:
      - master
      - claude/anela-cafe-fukuoka-site-2t49iq
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://gakikocamp.github.io
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build 大濠店 (ohori)
        run: pnpm --filter ohori build
        env:
          PAGES_BASE: /kinoko/ohori

      - name: Build 原田店 (harada)
        run: pnpm --filter harada build
        env:
          PAGES_BASE: /kinoko/harada

      - name: Assemble site
        run: |
          mkdir -p _site
          cp deploy/landing/index.html _site/index.html
          cp -r sites/ohori/dist _site/ohori
          cp -r sites/harada/dist _site/harada

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
