<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>アネラカフェ福岡｜プレビュー</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --cream: #fbf8f2;
        --ink: #3d372f;
        --ink-soft: #6e6456;
        --teal: #5c9ead;
        --teal-deep: #3c6e79;
        --coral: #e0876b;
        --gold: #d9a65a;
        --line: #e7ddcb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 8px;
        padding: 40px 20px;
        font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
        color: var(--ink);
        background: radial-gradient(90% 80% at 80% 0%, #e7f0f1 0%, var(--cream) 55%);
        text-align: center;
      }
      .eyebrow { letter-spacing: .18em; font-size: .72rem; color: var(--gold); font-weight: 700; }
      h1 { font-family: "Hiragino Mincho ProN", "Noto Serif JP", serif; color: var(--teal-deep); margin: 6px 0 2px; }
      p.note { color: var(--ink-soft); max-width: 560px; margin: 0 auto 28px; }
      .cards { display: grid; gap: 18px; grid-template-columns: 1fr; max-width: 720px; margin-inline: auto; }
      @media (min-width: 680px) { .cards { grid-template-columns: 1fr 1fr; } }
      .card {
        background: #fff; border: 1px solid var(--line); border-top: 4px solid var(--teal);
        border-radius: 16px; padding: 28px; text-decoration: none; color: inherit;
        box-shadow: 0 10px 30px rgba(58,48,39,.08); transition: transform .15s ease;
      }
      .card:hover { transform: translateY(-3px); }
      .card.harada { border-top-color: var(--coral); }
      .card h2 { color: var(--teal-deep); margin: 0 0 6px; }
      .card span { color: var(--coral); font-weight: 700; }
      .warn { margin-top: 28px; font-size: .8rem; color: var(--ink-soft); }
    </style>
  </head>
  <body>
    <span class="eyebrow">✦ ANELA CAFE FUKUOKA ・ PREVIEW</span>
    <h1>アネラカフェ福岡</h1>
    <p class="note">プレビュー版です。下記から各店舗サイトをご覧ください。<br />内容・写真・料金は仮（プレースホルダー）です。</p>
    <div class="cards">
      <a class="card ohori" href="/kinoko/ohori/">
        <h2>大濠店</h2>
        <p>大濠公園のそばのアネラカフェ</p>
        <span>サイトを見る →</span>
      </a>
      <a class="card harada" href="/kinoko/harada/">
        <h2>原田店</h2>
        <p>原田のまちのアネラカフェ</p>
        <span>サイトを見る →</span>
      </a>
    </div>
    <p class="warn">※ このプレビューは GitHub Pages の仮公開です。本番は独自ドメインでの公開を想定しています。</p>
  </body>
</html>
